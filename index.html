<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROWASH express</title>

<style>

/* 🚗 BACKGROUND CAR + DARK OVERLAY */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;

    background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
        url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    animation: zoomBg 20s ease infinite alternate;
}

/* subtle zoom animation */
@keyframes zoomBg {
    from { background-size: 100%; }
    to { background-size: 110%; }
}

/* 🧊 GLASS CARD */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius: 25px;
    padding: 30px;
    width: 360px;
    text-align: center;
    box-shadow: 0 0 40px rgba(59,130,246,0.4);
    border: 1px solid rgba(255,255,255,0.2);
}

/* 🔥 TOP GLOW */
.top-glow {
    height: 4px;
    width: 70%;
    margin: auto;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    border-radius: 10px;
}

/* 🖼 LOGO */
.logo {
    width: 140px;
    margin-bottom: 15px;
    background: transparent;
    filter: drop-shadow(0 0 10px #3b82f6);
}

/* 📝 TITLE */
h1 {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ffffff, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px rgba(59,130,246,0.6);
}

/* tagline */
.tagline {
    color: #cbd5f5;
    font-size: 14px;
    margin-bottom: 20px;
}

/* section */
.subtitle {
    color: #cbd5f5;
    text-align: left;
    margin-bottom: 10px;
}

/* 🔗 LINKS */
.link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 15px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s;
}

/* hover effect */
.link:hover {
    background: rgba(59,130,246,0.3);
    box-shadow: 0 0 20px #3b82f6;
    transform: scale(1.03);
}

/* left */
.left {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 18px;
}

/* icons */
.icon {
    width: 40px;
    height: 40px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
}

/* arrow */
.arrow {
    font-size: 18px;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

    <div class="top-glow"></div>

    <!-- 🔥 YOUR LOGO -->
    <img src="1.png" class="logo">

    <h1>PROWASH express</h1>
    <p class="tagline">Car Wash • Fast • Professional</p>

    <div class="subtitle">Find me on</div>

    <!-- WhatsApp -->
    <a class="link" href="https://wa.me/212657308755?text=Bonjour" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            WhatsApp
        </div>
        <div class="arrow">→</div>
    </a>

    <!-- Instagram -->
    <a class="link" href="https://www.instagram.com/prowash.express" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
            Instagram
        </div>
        <div class="arrow">→</div>
    </a>

    <!-- TikTok -->
    <a class="link" href="https://www.tiktok.com/@prowash.express" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
            TikTok
        </div>
        <div class="arrow">→</div>
    </a>

    <!-- Facebook -->
    <a class="link" href="https://www.facebook.com/profile.php?id=61575408575642" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
            Facebook
        </div>
        <div class="arrow">→</div>
    </a>

</div>

</body>
</html>
