<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROWASH express</title>

<style>

/* GLOBAL */
* {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
}

/* 🚗 BACKGROUND */
body {
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;

    background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
        url('https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* 🧊 CARD */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius: 25px;
    padding: 30px;
    width: 90%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 0 40px rgba(59,130,246,0.4);
    border: 1px solid rgba(255,255,255,0.2);
}

/* 🔥 TOP GLOW */
.top-glow {
    height: 4px;
    width: 70%;
    margin: auto;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    border-radius: 10px;
}

/* 🌟 LOGO CONTAINER */
.logo-container {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
}

/* 💡 GLOW DERRIÈRE LOGO */
.logo-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(59,130,246,0.8), transparent 70%);
    transform: translate(-50%, -50%);
    filter: blur(25px);
    z-index: 0;
}

/* 🖼 LOGO */
.logo {
    position: relative;
    width: 160px;
    max-width: 100%;
    height: auto;
    z-index: 1;
}

/* 📱 MOBILE */
@media (max-width: 500px) {
    .logo {
        width: 200px;
    }

    .logo-glow {
        width: 220px;
        height: 220px;
    }
}

/* 📝 TITLE */
h1 {
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ffffff, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* tagline */
.tagline {
    color: #cbd5f5;
    font-size: 14px;
    margin-bottom: 20px;
}

/* section */
.subtitle {
    color: #cbd5f5;
    text-align: left;
    margin-bottom: 10px;
}

/* 🔗 LINKS */
.link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 15px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s;
}

/* hover */
.link:hover {
    background: rgba(59,130,246,0.3);
    box-shadow: 0 0 20px #3b82f6;
    transform: scale(1.03);
}

/* left */
.left {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 18px;
}

/* icons */
.icon {
    width: 40px;
    height: 40px;
}

/* arrow */
.arrow {
    font-size: 18px;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

    <div class="top-glow"></div>

    <!-- 🌟 LOGO AVEC GLOW -->
    <div class="logo-container">
        <div class="logo-glow"></div>
        <img src="1.png" class="logo">
    </div>

    <h1>PROWASH express</h1>
    <p class="tagline">Car Wash • Fast • Professional</p>

    <div class="subtitle">Find me on</div>

    <!-- WhatsApp -->
    <a class="link" href="https://wa.me/212657308755?text=Bonjour" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            WhatsApp
        </div>
        <div class="arrow">→</div>
    </a>

    <!-- Instagram -->
    <a class="link" href="https://www.instagram.com/prowash.express" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
            Instagram
        </div>
        <div class="arrow">→</div>
    </a>

    <!-- TikTok -->
    <a class="link" href="https://www.tiktok.com/@prowash.express" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
            TikTok
        </div>
        <div class="arrow">→</div>
    </a>

    <!-- Facebook -->
    <a class="link" href="https://www.facebook.com/profile.php?id=61575408575642" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
            Facebook
        </div>
        <div class="arrow">→</div>
    </a>

</div>

</body>
</html>
