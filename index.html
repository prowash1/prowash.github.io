<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROWASH express</title>

<style>
/* 🌌 Background futuriste */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #3b82f6);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
}

/* animation background */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 Glass card */
.container {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 25px;
    width: 350px;
    text-align: center;
    box-shadow: 0 0 30px rgba(59,130,246,0.5);
    border: 1px solid rgba(255,255,255,0.2);
}

/* 🖼 Logo */
.logo {
    width: 110px;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 10px #3b82f6);
}

/* 📝 Title */
h1 {
    color: white;
    margin-bottom: 20px;
}

/* subtitle */
.subtitle {
    color: #cbd5f5;
    text-align: left;
    margin-bottom: 10px;
}

/* 🔗 links */
.link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 12px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

/* hover futuriste */
.link:hover {
    background: rgba(59,130,246,0.2);
    box-shadow: 0 0 15px #3b82f6;
    transform: translateY(-3px);
}

/* left side */
.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* icons */
.icon {
    width: 28px;
}

/* arrow */
.arrow {
    font-size: 18px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="container">

    <img src="1.png" class="logo">

    <h1>PROWASH express</h1>

    <div class="subtitle">Find me on</div>

    <a class="link" href="https://wa.me/212657308755?text=Bonjour" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            WhatsApp
        </div>
        <div class="arrow">→</div>
    </a>

    <a class="link" href="https://www.instagram.com/prowash.express" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
            Instagram
        </div>
        <div class="arrow">→</div>
    </a>

    <a class="link" href="https://www.tiktok.com/@prowash.express" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
            TikTok
        </div>
        <div class="arrow">→</div>
    </a>

    <a class="link" href="https://www.facebook.com/profile.php?id=61575408575642" target="_blank">
        <div class="left">
            <img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
            Facebook
        </div>
        <div class="arrow">→</div>
    </a>

</div>

</body>
</html>
